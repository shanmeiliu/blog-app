<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Blog</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="search-tools">
  <div class="search-mode-wrapper">
  <select id="searchMode" class="search-mode">
    <option value="default">Default search</option>
    <option value="advanced">Advanced tag filter</option>
  </select>
</div>

  <input id="search" placeholder="Search posts..." />

  <div id="advancedFilter" class="advanced-filter hidden">
    <div class="advanced-row">
      <span>Match tags by:</span>
      <button id="logicOr" class="logic-btn active">OR</button>
      <button id="logicAnd" class="logic-btn">AND</button>
    </div>

    <input id="tagSearch" class="tag-search" placeholder="Search tags..." />

    <div id="selectedTags" class="selected-tags"></div>
    <div id="tagLetters" class="tag-letters"></div>
    <div id="tagBrowser" class="tag-browser"></div>
  </div>
</div>
      <!-- <input
        type="text"
        id="search"
        placeholder="Search blog posts..."
      /> -->
    </header>

    <main id="content"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script type="module" src="./index.js"></script>
</body>
</html>
